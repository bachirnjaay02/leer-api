[deploy]
startCommand = "php artisan migrate --force && php artisan storage:link --force && php-fpm8.2 -D && nginx -g 'daemon off;'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300

[[cronJobs]]
name = "prayer-notifications"
schedule = "* * * * *"
command = "php artisan schedule:run >> /dev/null 2>&1"
